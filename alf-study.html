<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALF Interview Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --border: #d1dae6;
      --navy: #0f1f3a;
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --text: #1e293b;
      --muted: #64748b;
      --green: #15803d;
      --green-bg: #dcfce7;
      --yellow: #92400e;
      --yellow-bg: #fef3c7;
      --red: #991b1b;
      --red-bg: #fee2e2;
      --side-w: 210px;
      --insp-w: 300px;
      --hdr-h: 50px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }
    .app-shell {
      display: grid;
      grid-template-rows: var(--hdr-h) 1fr;
      grid-template-columns: var(--side-w) minmax(0,1fr) var(--insp-w);
      height: 100vh;
    }

    /* ── Header ── */
    .top-bar {
      grid-column: 1 / -1;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
    }
    .logo { font-weight: 700; font-size: 0.88rem; color: #93c5fd; white-space: nowrap; }
    .logo span { color: #fff; }
    .hdr-sub { font-size: 0.68rem; color: rgba(255,255,255,0.35); }
    .mode-switcher { display: flex; gap: 0.25rem; margin-left: auto; }
    .mode-btn {
      padding: 0.25rem 0.75rem;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .mode-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    .mode-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .hdr-stats { display: flex; gap: 0.35rem; margin-left: 1rem; }
    .hstat { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700; }
    .hstat.g { background: #14532d; color: #4ade80; }
    .hstat.y { background: #78350f; color: #fbbf24; }
    .hstat.r { background: #450a0a; color: #f87171; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 0.75rem 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .nav-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0.5rem 0.6rem 0.2rem;
    }
    .path-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      width: 100%;
      padding: 0.42rem 0.6rem;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.77rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: all 0.12s;
      line-height: 1.3;
    }
    .path-btn:hover { background: var(--bg); color: var(--text); }
    .path-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
    .q-num { font-size: 0.62rem; font-weight: 700; min-width: 20px; }
    .warn-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; margin-left: auto; flex-shrink: 0; }
    .nav-spacer { height: 0.5rem; }
    .legend-box {
      margin-top: auto;
      padding: 0.6rem 0.7rem;
      font-size: 0.62rem;
      color: var(--muted);
      line-height: 1.7;
      border-top: 1px solid var(--border);
    }

    /* ── Canvas ── */
    .canvas { overflow-y: auto; padding: 1.5rem 1.75rem; }

    /* ── Inspector ── */
    .inspector {
      background: var(--panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.77rem;
    }
    .insp-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      gap: 0.4rem;
      font-size: 0.78rem;
    }
    .insp-arrow { font-size: 1.4rem; }
    .insp-title {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .insp-sec { margin-bottom: 0.9rem; }
    .insp-sec-lbl {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .insp-sec-lbl.say { color: var(--green); }
    .insp-sec-lbl.avoid { color: var(--red); }
    .insp-sec-lbl.ev { color: var(--blue); }
    .insp-box {
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      line-height: 1.65;
    }
    .insp-box.say { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .insp-box.avoid { background: #fef2f2; border: 1px solid #fecaca; }
    .insp-box.ev { background: #eff6ff; border: 1px solid #bfdbfe; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.64rem;
      font-weight: 700;
      padding: 0.12rem 0.48rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.confirmed { background: var(--green-bg); color: var(--green); }
    .badge.plausible { background: var(--yellow-bg); color: var(--yellow); }
    .badge.speculative { background: var(--red-bg); color: var(--red); }

    /* ── Q View ── */
    .q-header { margin-bottom: 1.25rem; }
    .q-tag { font-size: 0.66rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
    .q-question { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 0.65rem; line-height: 1.4; }
    .q-headline {
      background: var(--blue-light);
      border: 1px solid #bfdbfe;
      border-left: 3px solid var(--blue);
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--navy);
    }
    .hl-lbl { font-size: 0.6rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 0.15rem; }
    .sec-title { font-size: 0.66rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin: 1.1rem 0 0.55rem; }
    .point-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .point-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .point-card:hover { border-color: var(--blue); box-shadow: 0 0 0 3px #eff6ff; }
    .point-card.active { border-color: var(--blue); box-shadow: 0 0 0 3px #eff6ff; background: #fafcff; }
    .pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.25rem; }
    .pc-title { font-weight: 600; font-size: 0.84rem; color: var(--navy); }
    .pc-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.55; }
    .pc-meta { display: flex; gap: 0.4rem; align-items: center; margin-top: 0.3rem; }
    .pc-id { font-size: 0.62rem; font-family: monospace; color: #94a3b8; }
    .pc-hint { font-size: 0.6rem; color: #94a3b8; margin-left: auto; }
    .warn-section { margin-top: 1.1rem; }
    .warn-card {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 3px solid #ef4444;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.45rem;
    }
    .warn-head { font-weight: 700; font-size: 0.78rem; color: #991b1b; margin-bottom: 0.2rem; }
    .warn-body { font-size: 0.75rem; color: #7f1d1d; line-height: 1.55; }

    /* ── Tech/Biz Detail Panel ── */
    .detail-grid {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      margin-bottom: 0.5rem;
    }
    .detail-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.28rem 0;
      font-size: 0.77rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-lbl { color: var(--muted); min-width: 130px; flex-shrink: 0; }

    /* ── Architecture Flow Map ── */
    .flow-board {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; position: relative; height: 460px; margin-bottom: 0.75rem;
    }
    .flow-map { position: relative; height: 100%; }
    .arch-fn {
      position: absolute; left: var(--x); top: var(--y);
      width: 12%; min-height: 72px; transform: translateY(-50%); z-index: 2;
      cursor: pointer; text-align: left; border-radius: 10px; padding: 0.5rem 0.6rem;
      border: 1.5px solid var(--border); background: var(--panel);
      font-size: 0.72rem; font-weight: 700; color: var(--navy); line-height: 1.25;
      transition: border-color .15s, box-shadow .15s, opacity .2s; font-family: inherit;
    }
    .arch-fn small { display: block; margin-top: 4px; color: var(--muted); font-size: 0.62rem; font-weight: 500; line-height: 1.3; }
    .arch-fn:hover { border-color: var(--blue); box-shadow: 0 0 0 3px #eff6ff; }
    .arch-fn.active { border-color: var(--blue); background: var(--blue-light); box-shadow: 0 0 0 3px #dbeafe; }
    .arch-fn.dim { opacity: 0.15; pointer-events: none; }
    .arch-fn.ext   { border-color: #a5f3fc; background: #ecfeff; }
    .arch-fn.plat  { border-color: #ddd6fe; background: #f5f3ff; }
    .arch-fn.router{ border-color: #93c5fd; background: #dbeafe; }
    .arch-fn.rag   { border-color: #99f6e4; background: #f0fdfa; }
    .arch-fn.tool  { border-color: #6ee7b7; background: #ecfdf5; }
    .arch-fn.guard { border-color: #fcd34d; background: #fffbeb; }
    .arch-fn.out   { border-color: #86efac; background: #f0fdf4; }
    .arch-fn.hoff  { border-color: #fca5a5; background: #fff1f2; }
    .arch-group {
      position: absolute; border-radius: 14px; z-index: 0; pointer-events: none;
    }
    .arch-group.plat { left:19.5%; top:4%; width:14.5%; height:91%; background:rgba(124,58,237,.04); border:1.5px dashed rgba(124,58,237,.28); }
    .arch-group.eng  { left:35.5%; top:4%; width:37%;   height:91%; background:rgba(15,118,110,.04); border:1.5px dashed rgba(15,118,110,.28); }
    .arch-group-lbl {
      position: absolute; font-size: 0.57rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; z-index: 1; pointer-events: none;
    }
    .arch-group-lbl.plat { left:20.5%; top:5.5%; color:rgba(124,58,237,.55); }
    .arch-group-lbl.eng  { left:36.5%; top:5.5%; color:rgba(15,118,110,.55); }
    .flow-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .flow-svg path { fill: none; stroke: #c8d8ea; stroke-width: 0.55; transition: stroke .2s, opacity .2s, stroke-width .2s; }
    .flow-svg path.dim { opacity: 0.08; }
    .flow-svg path.hi-blue { stroke: #2563eb; stroke-width: 1.3; }
    .flow-svg path.hi-teal { stroke: #0d9488; stroke-width: 1.3; }
    .flow-svg path.hi-red  { stroke: #ef4444; stroke-width: 1.3; }
    .arch-steps { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .arch-step-btn {
      border: 1px solid var(--border); background: var(--panel); border-radius: 999px;
      padding: 0.26rem 0.8rem; font-size: 0.71rem; color: var(--muted); font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .12s;
    }
    .arch-step-btn:hover { color: var(--text); border-color: #94a3b8; }
    .arch-step-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    .member-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; margin-top: 0.4rem; }
    .member-table th { background: var(--bg); padding: 0.32rem 0.55rem; border: 1px solid var(--border); text-align: left; font-size: 0.64rem; color: var(--muted); text-transform: uppercase; }
    .member-table td { padding: 0.32rem 0.55rem; border: 1px solid var(--border); vertical-align: top; }
    .member-table tr:hover td { background: #fafbfc; }
    .code { font-family: monospace; font-size: 0.7rem; color: #4f46e5; background: #f0f0ff; padding: 0.05rem 0.3rem; border-radius: 3px; }

    /* ── Evidence Table ── */
    .ev-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .ev-sel {
      padding: 0.28rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      font-size: 0.74rem;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }
    .ev-count { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.4rem; }
    .ev-wrap { overflow-x: auto; }
    .ev-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; }
    .ev-table th {
      background: var(--bg);
      padding: 0.38rem 0.6rem;
      border: 1px solid var(--border);
      text-align: left;
      font-size: 0.64rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .ev-table td { padding: 0.38rem 0.6rem; border: 1px solid var(--border); vertical-align: top; }
    .ev-table tr:hover td { background: var(--bg); }
    .ev-table tr.warn-row td { background: #fff5f5; }
    .w-dot { color: #ef4444; }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Header -->
  <header class="top-bar">
    <div class="logo">ALF <span>Interview Prep</span></div>
    <div class="hdr-sub">채널톡 면접 대비 · 2026-05</div>
    <div class="mode-switcher">
      <button class="mode-btn active" data-mode="overview">개요</button>
      <button class="mode-btn" data-mode="tech">기술</button>
      <button class="mode-btn" data-mode="biz">비즈니스</button>
    </div>
    <div class="hdr-stats">
      <span class="hstat g">🟢 8</span>
      <span class="hstat y">🟡 40</span>
      <span class="hstat r">🔴 21</span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-label">인터뷰 질문</div>
    <button class="path-btn active" data-view="q1"><span class="q-num">Q1</span>기술 아키텍처</button>
    <button class="path-btn" data-view="q2"><span class="q-num">Q2</span>현재 기능·한계</button>
    <button class="path-btn" data-view="q3"><span class="q-num">Q3</span>데이터 통합</button>
    <button class="path-btn" data-view="q4"><span class="q-num">Q4</span>신뢰성·Guardrail<span class="warn-dot"></span></button>
    <button class="path-btn" data-view="q5"><span class="q-num">Q5</span>시장 차별화</button>
    <button class="path-btn" data-view="q6"><span class="q-num">Q6</span>미래 방향</button>
    <div class="nav-spacer"></div>
    <div class="nav-label">참고 자료</div>
    <button class="path-btn" data-view="arch"><span class="q-num">🗺️</span>시스템 아키텍처</button>
    <button class="path-btn" data-view="ev"><span class="q-num">📊</span>증거 트래커</button>
    <button class="path-btn" data-view="hal"><span class="q-num">⚠️</span>환각 4건</button>
    <div class="legend-box">
      🟢 Reliable: 외부 교차검증<br>
      🟡 Plausible: ALF 자기보고<br>
      🔴 Speculative: 추론·미검증
    </div>
  </aside>

  <!-- Canvas -->
  <main class="canvas" id="canvas"></main>

  <!-- Inspector -->
  <aside class="inspector" id="inspector">
    <div class="insp-empty" id="insp-empty">
      <div class="insp-arrow">←</div>
      <div>항목을 클릭하면<br>상세 정보가 표시됩니다</div>
    </div>
    <div id="insp-content" style="display:none;"></div>
  </aside>

</div>
<script>
// ── DATA ────────────────────────────────────────────────────────────

const views = {
  q1: {
    tag:'Q1', question:'ALF의 기술 아키텍처를 설명해주세요.',
    headline:'RAG 기반 · 3경로 라우팅 · 3겹 Guardrail 구조',
    points:[
      {
        id:'D-01', conf:'confirmed',
        title:'RAG (Retrieval-Augmented Generation)',
        desc:'지식베이스 문서를 벡터 임베딩으로 저장 → 고객 질문과 유사한 청크 검색(Retrieve) → LLM이 해당 컨텍스트로 답변 생성. 채널톡 공식 블로그 RAG 설정 가이드 확인.',
        say:'ALF는 RAG 구조를 핵심으로 사용합니다. 고객 질문이 들어오면 지식베이스에서 관련 문서를 검색한 뒤, 그 내용을 근거로 LLM이 답변을 생성합니다.',
        avoid:'환각을 완전히 방지한다고 말하지 마세요. RAG는 환각을 줄이는 구조이지 완전 제거는 아닙니다.',
        ev:'🟢 D-01 — 채널톡 공식 블로그 RAG 설정 가이드 확인. 외부 교차검증 완료.'
      },
      {
        id:'D-08', conf:'plausible',
        title:'3경로 라우팅: RAG직답 / 태스크유도 / Handoff',
        desc:'① 단순 질문 → RAG 직접 답변 ② 프로세스 필요 → 태스크·워크플로 유도 ③ 복잡·권한 부족 → Human Handoff. "1~3단계"라는 번호 체계는 ALF의 개념적 설명 표현이며 공식 시스템명이 아님(ALF 직접 확인).',
        say:'라우팅은 질문 유형에 따라 세 경로로 분기됩니다. 단순 FAQ는 RAG가 직답하고, 주문 취소 같은 프로세스는 워크플로를 유도하며, 권한·정보가 부족하면 상담원으로 연결합니다.',
        avoid:'"1단계/2단계/3단계"라는 번호를 공식 용어처럼 쓰지 마세요. ALF 설명 편의상 표현으로, 공식 명칭이 아닙니다.',
        ev:'🟡 D-08 — ALF CV답변에서 직접 확인. 개념적 구조는 타당하나 공식 명칭 미확인.'
      },
      {
        id:'F-23', conf:'plausible',

const state = { view:'q1', mode:'overview', active:null };

// ── HELPERS ──────────────────────────────────────────────────────────
function badge(conf) {
  const m = {confirmed:'🟢 확인됨', plausible:'🟡 개연성', speculative:'🔴 추론'};
  return `<span class="badge ${conf}">${m[conf]||conf}</span>`;
}

// ── RENDERERS ────────────────────────────────────────────────────────
function renderQ(key) {
  const v = views[key];
  const showTech = state.mode === 'tech' && v.tech;
  const showBiz  = state.mode === 'biz'  && v.biz;
  const extraPanel = (showTech || showBiz)
    ? `<div class="sec-title">${showTech ? '기술 세부사항' : '비즈니스 맥락'}</div>
       <div class="detail-grid">${(showTech ? v.tech : v.biz).map(r=>`
         <div class="detail-row"><span class="detail-lbl">${r.lbl}</span><span>${r.val}</span></div>`).join('')}
       </div>` : '';

  return `
    <div class="q-header">
      <div class="q-tag">${v.tag} · 인터뷰 질문</div>
      <div class="q-question">"${v.question}"</div>
      <div class="q-headline"><span class="hl-lbl">핵심 답변 프레임</span>${v.headline}</div>
    </div>
    <div class="sec-title">주요 포인트 — 클릭하면 우측에 상세</div>
    <div class="point-list">
      ${v.points.map((p,i)=>`
        <div class="point-card${state.active===key+i?' active':''}" onclick="selectPoint('${key}',${i})" data-view="${key}" data-idx="${i}">
          <div class="pc-top"><div class="pc-title">${p.title}</div>${badge(p.conf)}</div>
          <div class="pc-desc">${p.desc}</div>
          <div class="pc-meta"><span class="pc-id">${p.id}</span><span class="pc-hint">클릭 → 상세</span></div>
        </div>`).join('')}
    </div>
    ${extraPanel}
    ${v.warnings?.length ? `
      <div class="warn-section">
        <div class="sec-title">⚠️ 인터뷰에서 피할 것</div>
        ${v.warnings.map(w=>`
          <div class="warn-card">
            <div class="warn-head">🚫 ${w.title}</div>
            <div class="warn-body">${w.body}</div>
          </div>`).join('')}
      </div>` : ''}
  `;
}

}

    red: ['p-router-guard','p-guard-hoff'],
    blue: ['p-ch-crm','p-crm-router'],
    teal: []
  }
};

function archHighlight(mode) {
  document.querySelectorAll('.arch-step-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const cfg = archPaths[mode];
  document.querySelectorAll('.flow-svg path').forEach(p => {
    p.classList.remove('hi-blue','hi-teal','hi-red','dim');
    if (mode !== 'all') p.classList.add('dim');
  });
  document.querySelectorAll('.arch-fn').forEach(n => {
    n.classList.remove('dim');
    if (mode !== 'all') n.classList.add('dim');
  });
  if (mode === 'all') return;
  const allActive = new Set([
    ...(cfg.blue||[]).flatMap(id => archPathNodes[id]||[]),
    ...(cfg.teal||[]).flatMap(id => archPathNodes[id]||[]),
    ...(cfg.red ||[]).flatMap(id => archPathNodes[id]||[])
  ]);
  allActive.forEach(nid => {
    const el = document.querySelector(`.arch-fn[data-arch="${nid}"]`);
    if (el) el.classList.remove('dim');
  });
  (cfg.blue||[]).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('dim'); el.classList.add('hi-blue'); }
  });
  (cfg.teal||[]).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('dim'); el.classList.add('hi-teal'); }
  });
  (cfg.red||[]).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('dim'); el.classList.add('hi-red'); }
  });
}

function selectArchNode(id) {
  document.querySelectorAll('.arch-fn').forEach(n => n.classList.remove('active'));
  const el = document.querySelector(`.arch-fn[data-arch="${id}"]`);
  if (el) el.classList.add('active');
  const n = archNodes[id];
  if (!n) return;
  const badgeMap = {confirmed:'🟢 확인됨', plausible:'🟡 개연성', speculative:'🔴 추론'};
  document.getElementById('insp-empty').style.display = 'none';
  document.getElementById('insp-content').style.display = 'block';
  document.getElementById('insp-content').innerHTML = `
    <div class="insp-title">${n.title}</div>
    <div style="margin-bottom:0.6rem;"><span class="badge ${n.badge}">${badgeMap[n.badge]}</span></div>
    <div class="insp-sec">
      <div class="insp-sec-lbl ev">역할</div>
      <div class="insp-box ev">${n.role}</div>

    <div class="insp-sec">

      <div class="insp-box ev" style="font-size:0.72rem;">${n.note}</div>
    </div>
  `;
}

function renderInspector(key, idx) {
  const v = views[key];
  const p = v?.points[idx];
  if (!p) return;
  document.getElementById('insp-empty').style.display  = 'none';
  document.getElementById('insp-content').style.display = 'block';
  document.getElementById('insp-content').innerHTML = `
    <div class="insp-title">${p.id}</div>
    <div style="margin-bottom:0.6rem;">${badge(p.conf)}</div>
    <div class="insp-sec">
      <div class="insp-sec-lbl say">✅ 이렇게 말하세요</div>
      <div class="insp-box say">${p.say}</div>
    </div>
    <div class="insp-sec">
      <div class="insp-sec-lbl avoid">🚫 이건 피하세요</div>
      <div class="insp-box avoid">${p.avoid}</div>
    </div>
    <div class="insp-sec">
      <div class="insp-sec-lbl ev">📋 근거</div>
      <div class="insp-box ev">${p.ev}</div>
    </div>
  `;
}

// ── ACTIONS ──────────────────────────────────────────────────────────
function switchView(key) {
  state.view   = key;
  state.active = null;
  document.querySelectorAll('.path-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===key));
  document.getElementById('insp-empty').style.display   = 'flex';
  document.getElementById('insp-content').style.display = 'none';
  const canvas = document.getElementById('canvas');
  if      (key === 'ev')   { canvas.innerHTML = renderEv();   renderEvTable(); }
  else if (key === 'hal')  { canvas.innerHTML = renderHal();  }
  else if (key === 'arch') { canvas.innerHTML = renderArch(); }
  else if (views[key])     { canvas.innerHTML = renderQ(key); }
}

function selectPoint(key, idx) {
  state.active = key + idx;
  document.querySelectorAll('.point-card').forEach(c=>{
    c.classList.toggle('active', c.dataset.view===key && parseInt(c.dataset.idx)===idx);
  });
  renderInspector(key, idx);
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
  if (views[state.view]) document.getElementById('canvas').innerHTML = renderQ(state.view);
}

// ── INIT ─────────────────────────────────────────────────────────────
document.querySelectorAll('.path-btn').forEach(b=>b.addEventListener('click', ()=>switchView(b.dataset.view)));
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click', ()=>setMode(b.dataset.mode)));
switchView('q1');
